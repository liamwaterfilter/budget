const LS={get(k,d){try{const v=localStorage.getItem('b_'+k);return v?JSON.parse(v):d}catch{return d}},set(k,v){try{localStorage.setItem('b_'+k,JSON.stringify(v))}catch{}}};

(function(){const cm=curMK();const ap=state.expenses.filter(e=>e.recurring&&mKey(e.date)===cm).map(e=>e.merchant.toLowerCase());state.recurring.filter(r=>!ap.includes(r.merchant.toLowerCase())).forEach(r=>{state.expenses.push({id:uid(),merchant:r.merchant,amount:r.amount,category:r.category,date:new Date().toISOString(),recurring:true,auto:true})});save()})();

if(state.tab==='dashboard')rDash(inner);else if(state.tab==='add')rAdd(inner);else if(state.tab==='history')rHist(inner);else if(state.tab==='settings')rSet(inner);
page.appendChild(inner);app.appendChild(page);app.appendChild(rTabs())}

function rDash(el){
const cm=curMK(),mtx=state.expenses.filter(e=>mKey(e.date)===cm),spent=mtx.reduce((s,e)=>s+e.amount,0),budget=state.settings.monthlyBudget,left=budget-spent,pct=budget>0?Math.min((spent/budget)*100,100):0,ringCol=pct>90?'var(--red)':pct>70?'var(--orange)':'var(--accent)',R=46,C2=2*Math.PI*R,off=C2-(pct/100)*C2,dayN=new Date().getDate(),dAvg=dayN>0?spent/dayN:0,inc=state.settings.monthlyIncome,sav=inc>0?inc-spent:null,savR=inc>0?Math.round(((inc-spent)/inc)*100):null;
el.appendChild(h('div',{style:{paddingBottom:'18px'}},h('div',{class:'h1'},'Budget'),h('div',{class:'subtitle'},new Date().toLocaleString('default',{month:'long'})+' overview')));
// Drafts

// Ring
const rw=h('div',{class:'ring-wrap'});rw.innerHTML='<svg width="114" height="114" viewBox="0 0 114 114"><circle cx="57" cy="57" r="'+R+'" fill="none" stroke="var(--bar-trk)" stroke-width="9"/><circle cx="57" cy="57" r="'+R+'" fill="none" stroke="'+ringCol+'" stroke-width="9" stroke-dasharray="'+C2+'" stroke-dashoffset="'+off+'" stroke-linecap="round" transform="rotate(-90 57 57)" style="transition:stroke-dashoffset .8s cubic-bezier(.22,1,.36,1)"/></svg>';

else sr.appendChild(h('div',{class:'stat'},h('div',{class:'stat-l'},'Transactions'),h('div',{class:'stat-v mono'},String(mtx.length)),h('div',{class:'stat-s'},'this month')));
