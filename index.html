[data-theme="light"]{--bg:#F4F6FA;--card:#FFF;--card-bd:#E8ECF4;--inp-bg:#F0F3F8;--inp-bd:#DDE3ED;--text:#1A1F2E;--text2:#4A5568;--text3:#8896AB;--text4:#B0BBCB;--accent:#2AB5AC;--accent2:#239089;--acsoft:rgba(42,181,172,.06);--red:#EF4444;--redsoft:rgba(239,68,68,.05);--orange:#D97706;--orsoft:rgba(217,119,6,.05);--green:#059669;--grsoft:rgba(5,150,105,.05);--blue:#2563EB;--blsoft:rgba(37,99,235,.05);--purple:#7C3AED;--prsoft:rgba(124,58,237,.05);--cyan:#0891B2;--cysoft:rgba(8,145,178,.05);--divider:#EDF0F5;--tab-bg:#FFF;--bar-trk:#E8ECF4;--chip-bg:#F0F3F8;--shadow:0 2px 12px rgba(0,0,0,.04),0 0 0 1px rgba(0,0,0,.02);--hero:linear-gradient(135deg,#1E3A5F,#2D5F8A,#1A3356)}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;-webkit-font-smoothing:antialiased;transition:background var(--tr),color var(--tr)}
#app{height:100%;display:flex;flex-direction:column}
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}.pg{padding:calc(var(--safe-t) + 8px) 16px 28px}
.h1{font-size:28px;font-weight:800;letter-spacing:-.6px}.sub{font-size:13px;color:var(--text4);margin-top:3px}
.lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}.cap{font-size:12px;color:var(--text4);line-height:1.5}
.over{font-size:10px;font-weight:600;color:var(--text4);text-transform:uppercase;letter-spacing:1px}
.card{background:var(--card);border:1px solid var(--card-bd);border-radius:var(--r);padding:20px;margin-bottom:12px;box-shadow:var(--shadow);transition:all var(--tr)}
.input{width:100%;background:var(--inp-bg);border:1.5px solid var(--inp-bd);border-radius:var(--rs);padding:13px 16px;font-size:15px;font-family:var(--font);color:var(--text);outline:none;transition:border-color var(--tr);-webkit-appearance:none}
.input:focus{border-color:var(--accent)}.input::placeholder{color:var(--text4)}

.amt-sign{font-size:32px;font-weight:300;color:var(--text4);font-family:var(--mono)}

.tx{display:flex;align-items:center;gap:13px;padding:14px 0;border-bottom:1px solid var(--divider)}

.tx-meta{font-size:11px;color:var(--text4);margin-top:2px}.tx-note{font-size:11px;color:var(--text3);margin-top:2px;font-style:italic}

.auto-hint{font-size:12px;color:var(--text4);margin-top:6px;padding-left:2px}

.undo-bar{position:fixed;bottom:calc(70px + var(--safe-b));left:16px;right:16px;background:var(--text);color:var(--bg);padding:14px 18px;border-radius:var(--rs);display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600;z-index:100;box-shadow:0 8px 30px rgba(0,0,0,.3);animation:slideUp .25s ease-out}

.mo-bar-w{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}

.cat-budget-input{width:76px;background:var(--inp-bg);border:1px solid var(--inp-bd);border-radius:var(--rx);padding:7px 10px;font-size:13px;font-family:var(--mono);color:var(--text);outline:none;text-align:right}.cat-budget-input:focus{border-color:var(--accent)}

.hero-circle2{position:absolute;bottom:-30px;left:-10px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.02)}

// ═══ CSV ═══
function xCSV(ex,label){const hdr='Date,Merchant,Category,Amount,Note,Recurring\n';const rows=ex.map(e=>{const d=new Date(e.date).toLocaleDateString('en-US');return d+',"'+e.merchant+'",'+(CATS[e.category]||CATS.other).l+','+e.amount.toFixed(2)+',"'+(e.note||'').replace(/"/g,'""')+'",'+(e.recurring?'Yes':'No')}).join('\n');const blob=new Blob([hdr+rows],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='budget-'+label.replace(/\s+/g,'-').toLowerCase()+'.csv';a.click()}

[{k:'dashboard',i:'dash',l:'Dashboard'},{k:'add',i:'plus',l:'Add'},{k:'history',i:'clock',l:'History'},{k:'settings',i:'gear',l:'Settings'}].forEach(t=>{
const isOn=S.tab===t.k;const btn=h('button',{class:'tab',onClick:()=>{S.tab=t.k;render()}});
btn.innerHTML=icon(t.i,isOn?'var(--accent)':'var(--text4)',22)+`<span class="tab-label" style="color:${isOn?'var(--accent)':'var(--text4)'}">${t.l}</span>`;
bar.appendChild(btn)});return bar}

// ═══ DEEP LINK ═══
(function(){const p=new URLSearchParams(window.location.search);const rawA=p.get('amount'),rawM=p.get('merchant'),src=p.get('source')||'Apple Pay';
if(rawA){const amt=parseFloat(decodeURIComponent(rawA).replace(/[^0-9.]/g,''));const merchant=rawM?decodeURIComponent(rawM).replace(/[.!,;]+$/,'').trim().slice(0,40):'Apple Pay';
if(amt>0){S.drafts.push({id:uid(),merchant:merchant||'Apple Pay',amount:amt,source:src,suggestedCategory:categorize(merchant||''),timestamp:new Date().toISOString()});save();S.tab='dashboard'}window.history.replaceState({},'',window.location.pathname)}
const text=p.get('text');if(text&&!rawA){const pats=[/(?:made a|spent|charged|transaction)\s*\$?([\d,]+\.?\d*)\s*(?:at|to|for)\s+(.+)/i,/(?:sent|paid)\s+\$?([\d,]+\.?\d*)\s+(?:to|for)\s+(.+)/i,/\$?([\d,]+\.?\d{2})\s+(?:at|to|for)\s+(.+)/i];
for(const pt of pats){const m=decodeURIComponent(text).match(pt);if(m){const amt=parseFloat(m[1].replace(/,/g,''));const merchant=m[2].replace(/[.!,;]+$/,'').trim().slice(0,40);if(amt>0&&merchant){S.drafts.push({id:uid(),merchant,amount:amt,source:src,suggestedCategory:categorize(merchant),timestamp:new Date().toISOString()});save();break}}}
window.history.replaceState({},'',window.location.pathname)}})();

if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
applyTheme();render();
