<style>

<body>
<div id="app"></div>
<script>
// ═══ DATA LAYER ═══
const LS={get(k,d){try{const v=localStorage.getItem('b_'+k);return v?JSON.parse(v):d}catch{return d}},set(k,v){try{localStorage.setItem('b_'+k,JSON.stringify(v))}catch{}}};
const S={tab:'dashboard',expenses:LS.get('exp',[]),settings:LS.get('set',{monthlyIncome:0,monthlyBudget:2000,overrides:{},catBudgets:{},incomeRecurring:[]}),recurring:LS.get('rec',[]),drafts:LS.get('dft',[]),theme:LS.get('theme','dark'),selMonth:null,addAmt:'',addMerch:'',addCat:null,addRecur:false,addNote:'',addSuccess:false,editIncome:false,editBudget:false,incomeVal:'',budgetVal:'',showGuide:false,showCatBudgets:false,searchQ:'',undoItem:null,undoTimer:null};
if(!S.settings.catBudgets)S.settings.catBudgets={};
if(!S.settings.incomeRecurring)S.settings.incomeRecurring=[];
function save(){LS.set('exp',S.expenses);LS.set('set',S.settings);LS.set('rec',S.recurring);LS.set('dft',S.drafts)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function fmt(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:n%1===0?0:2}).format(n)}
function mKey(d){const dt=new Date(d);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')}
function curMK(){return mKey(new Date())}
function mLabel(mk){const[y,m]=mk.split('-');return new Date(+y,+m-1).toLocaleString('default',{month:'long',year:'numeric'})}
function mShort(mk){const[y,m]=mk.split('-');return new Date(+y,+m-1).toLocaleString('default',{month:'short'})}
function daysInMonth(mk){const[y,m]=mk.split('-');return new Date(+y,+m,0).getDate()}
function allMonths(){const set=new Set(S.expenses.map(e=>mKey(e.date)));set.add(curMK());return[...set].sort().reverse()}
function selMK(){return S.selMonth||curMK()}
function byMonth(mk){return S.expenses.filter(e=>mKey(e.date)===mk)}

// ═══ CATEGORIES ═══
const CATS={food:{l:'Food & Dining',i:'🍔',c:'--red',cs:'--redsoft',kw:['grocery','restaurant','food','uber eats','doordash','chipotle','starbucks','coffee','lunch','dinner','breakfast','pizza','sushi','mcdonalds','wendys','taco','grubhub','instacart','whole foods','trader joe','panera','chick-fil-a','subway','dunkin','panda express','wingstop','popeyes','bakery','cafe','brunch','bar','smoothie']},transport:{l:'Transport',i:'🚗',c:'--accent',cs:'--acsoft',kw:['gas','uber','lyft','parking','car','bus','train','metro','toll','oil change','mechanic','tire','car wash','fuel','shell','chevron','exxon','flight','airline']},entertainment:{l:'Entertainment',i:'🎮',c:'--purple',cs:'--prsoft',kw:['netflix','spotify','movie','game','concert','hulu','disney','hbo','youtube','twitch','steam','playstation','xbox','nintendo','ticket','show','theater','apple music','apple tv']},shopping:{l:'Shopping',i:'🛍️',c:'--orange',cs:'--orsoft',kw:['amazon','target','walmart','clothes','shoes','ebay','etsy','best buy','apple store','nike','adidas','zara','nordstrom','costco','macys','ikea']},bills:{l:'Bills & Utilities',i:'📄',c:'--cyan',cs:'--cysoft',kw:['rent','electric','water','internet','phone','wifi','utility','cable','mortgage','insurance','att','verizon','t-mobile','comcast','bill','subscription','icloud']},health:{l:'Health',i:'💊',c:'--green',cs:'--grsoft',kw:['doctor','pharmacy','gym','cvs','walgreens','hospital','dentist','therapy','vitamin','prescription','copay','fitness','planet fitness']},education:{l:'Education',i:'📚',c:'--blue',cs:'--blsoft',kw:['tuition','books','school','course','udemy','class','textbook','chegg','coursera']},other:{l:'Other',i:'📌',c:'--purple',cs:'--prsoft',kw:[]}};
const CK=Object.keys(CATS).filter(k=>k!=='other');
function categorize(m){const low=m.toLowerCase().trim();const ov=S.settings.overrides||{};if(ov[low])return ov[low];for(const[k,v]of Object.entries(ov))if(low.includes(k)||k.includes(low))return v;for(const[k,c]of Object.entries(CATS))if(c.kw.some(w=>low.includes(w)))return k;return'other'}
function cc(k){return'var('+((CATS[k]||CATS.other).c)+')'}
function cs(k){return'var('+((CATS[k]||CATS.other).cs)+')'}

// Apply recurring
(function(){const cm=curMK();const ap=S.expenses.filter(e=>e.recurring&&mKey(e.date)===cm).map(e=>e.merchant.toLowerCase());S.recurring.filter(r=>!ap.includes(r.merchant.toLowerCase())).forEach(r=>{S.expenses.push({id:uid(),merchant:r.merchant,amount:r.amount,category:r.category,date:new Date().toISOString(),recurring:true,auto:true})});
// Apply recurring income
(S.settings.incomeRecurring||[]).forEach(ri=>{const existing=S.expenses.filter(e=>e.isIncome&&e.merchant.toLowerCase()===ri.source.toLowerCase()&&mKey(e.date)===cm);if(!existing.length){S.expenses.push({id:uid(),merchant:ri.source,amount:ri.amount,category:'income',date:new Date().toISOString(),recurring:true,auto:true,isIncome:true})}});
save()})();

// ═══ INSIGHTS ENGINE ═══
function getInsights(mk){
const ins=[];const mtx=byMonth(mk);const spent=mtx.filter(e=>!e.isIncome).reduce((s,e)=>s+e.amount,0);
if(!mtx.length)return ins;
// Compare to last month
const[y,m]=mk.split('-').map(Number);const prevMK=(m===1?y-1:y)+'-'+String(m===1?12:m-1).padStart(2,'0');
const prevTx=byMonth(prevMK);const prevSpent=prevTx.filter(e=>!e.isIncome).reduce((s,e)=>s+e.amount,0);
if(prevSpent>0){const diff=((spent-prevSpent)/prevSpent*100).toFixed(0);if(diff>10)ins.push({icon:'📈',text:'Spending is up '+diff+'% compared to '+mShort(prevMK)+'.'});else if(diff<-10)ins.push({icon:'📉',text:'Spending is down '+Math.abs(diff)+'% compared to '+mShort(prevMK)+'. Nice!'})}
// Top category

const row=h('div',{class:'cat-budget-row'});

inp.addEventListener('change',e=>{const val=parseFloat(e.target.value)||0;if(val>0)S.settings.catBudgets[k]=val;else delete S.settings.catBudgets[k];save()});

// Recurring Income
el.appendChild(h('div',{class:'lbl',style:{marginTop:'24px'}},'Recurring Income'));
const riCard=h('div',{class:'card'},h('div',{class:'cap',style:{marginBottom:'14px'}},'Track paychecks and recurring income. Auto-added each month.'));
(S.settings.incomeRecurring||[]).forEach((ri,idx)=>{
riCard.appendChild(h('div',{class:'recur'},h('div',null,h('div',{style:{fontSize:'14px',fontWeight:'500',color:'var(--text2)'}},'💰 '+ri.source),h('div',{class:'cap',style:{marginTop:'2px'}},fmt(ri.amount)+'/month')),h('button',{class:'tx-del',onClick:()=>{S.settings.incomeRecurring.splice(idx,1);save();render()}},'×')))});
const addIncRow=h('div',{style:{display:'flex',gap:'8px',marginTop:'8px'}});

addIncRow.appendChild(h('button',{class:'btn btn-sm btn-ac',onClick:()=>{const src=incSrc.value.trim(),amt=parseFloat(incAmt.value);if(src&&amt>0){if(!S.settings.incomeRecurring)S.settings.incomeRecurring=[];S.settings.incomeRecurring.push({source:src,amount:amt});save();render()}}},'+'));

// Auto-capture guide
el.appendChild(h('div',{class:'lbl',style:{marginTop:'24px'}},'Auto-Capture (Apple Pay)'));
const sc=h('div',{class:'card'},h('div',{class:'cap',style:{lineHeight:'1.6'}},'Auto-log Apple Pay transactions via iOS Shortcuts. Every tap-to-pay creates a draft you confirm with one tap.'),h('button',{class:'btn btn-ghost btn-full btn-sm',style:{marginTop:'14px'},onClick:()=>{S.showGuide=!S.showGuide;render()}},S.showGuide?'Hide Setup Guide':'Show Setup Guide'));
if(S.showGuide){const g=h('div',{style:{marginTop:'16px',paddingTop:'16px',borderTop:'1px solid var(--divider)'}});
['<b>Requires:</b> iOS 17+ with Apple Pay','1. Open <span class="guide-hl">Shortcuts</span> → <span class="guide-hl">Automation</span> tab','2. Tap <span class="guide-hl">+</span> → scroll to <span class="guide-hl">Transaction</span> (or "Wallet")','3. Select <span class="guide-hl">all cards</span> and <span class="guide-hl">all categories</span>','4. Select <span class="guide-hl">"Run Immediately"</span>, turn off "Notify"','5. Tap Next → <span class="guide-hl">New Blank Automation</span>','6. <span class="guide-hl">"Add Action"</span> → search <span class="guide-hl">"Open URLs"</span>','7. Build this URL:'].forEach(s=>{const p=h('div',{class:'guide-step'});p.innerHTML=s;g.appendChild(p)});
g.appendChild(h('div',{class:'url-box',html:'https://liamwaterfilters.github.io/budget/?amount=<span class="url-var">[Amount]</span>&merchant=<span class="url-var">[Name]</span>'}));
['• Type URL to <span class="guide-hl">?amount=</span> then tap <span class="guide-hl">Amount</span> variable','• Type <span class="guide-hl">&merchant=</span> then tap <span class="guide-hl">Name</span> variable','8. Tap <span class="guide-hl">Done</span>','⚠️ Works for <span class="guide-hl">in-store tap-to-pay</span> only'].forEach(s=>{const p=h('div',{class:'guide-step'});p.innerHTML=s;g.appendChild(p)});
g.appendChild(h('button',{class:'btn btn-ghost btn-full btn-sm',style:{marginTop:'14px'},onClick:()=>{navigator.clipboard?.writeText('https://liamwaterfilters.github.io/budget/?amount=AMOUNT&merchant=MERCHANT');alert('URL copied!')}},'📋 Copy Base URL'));sc.appendChild(g)}
el.appendChild(sc);

// Recurring Expenses
const rt=S.recurring.reduce((s,r)=>s+r.amount,0);
el.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:'24px',marginBottom:'8px'}},h('div',{class:'lbl',style:{margin:'0'}},'Recurring Expenses'),h('span',{class:'over mono'},fmt(rt)+'/mo')));
const rc=h('div',{class:'card'});
if(!S.recurring.length)rc.appendChild(h('div',{class:'empty-text',style:{padding:'12px 0'}},'No recurring expenses yet.'));
else S.recurring.forEach(r=>{const def=CATS[r.category]||CATS.other;rc.appendChild(h('div',{class:'recur'},h('div',null,h('div',{style:{fontSize:'14px',fontWeight:'500',color:'var(--text2)'}},def.i+' '+r.merchant),h('div',{class:'cap',style:{marginTop:'2px'}},def.l)),h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},h('span',{class:'mono',style:{fontSize:'14px',fontWeight:'600'}},fmt(r.amount)),h('button',{class:'tx-del',onClick:()=>{if(confirm('Remove "'+r.merchant+'"?')){S.recurring=S.recurring.filter(x=>x.id!==r.id);save();render()}}},'×'))))});

// Data management
el.appendChild(h('div',{class:'lbl',style:{marginTop:'24px'}},'Data'));
const dataCard=h('div',{class:'card'});

dataCard.appendChild(h('div',{style:{display:'flex',gap:'10px',marginBottom:'10px'}},
h('button',{class:'btn btn-sm btn-ghost',style:{flex:'1'},onClick:()=>{const data={expenses:S.expenses,settings:S.settings,recurring:S.recurring};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='budget-backup-'+new Date().toISOString().split('T')[0]+'.json';a.click()}},'📤 Export Backup'),
h('button',{class:'btn btn-sm btn-ghost',style:{flex:'1'},onClick:()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.expenses){S.expenses=d.expenses;S.settings=d.settings||S.settings;S.recurring=d.recurring||[];save();alert('Backup restored!');render()}}catch{alert('Invalid backup file')}};r.readAsText(f)};inp.click()}},'📥 Import Backup')));
dataCard.appendChild(h('button',{class:'btn btn-danger btn-full',onClick:()=>{if(confirm('Reset all data? Cannot be undone.')){S.expenses=[];S.recurring=[];S.drafts=[];S.settings={monthlyIncome:0,monthlyBudget:2000,overrides:{},catBudgets:{},incomeRecurring:[]};save();render()}}},'Reset All Data'));
el.appendChild(dataCard);
el.appendChild(h('div',{class:'footer'},h('p',null,'Budget — personal finance tracker'),h('p',null,'100% local · no account · no cloud')))}

// ═══ CSV EXPORT ═══
function xCSV(ex,label){const hdr='Date,Merchant,Category,Amount,Note,Recurring\n';const rows=ex.map(e=>{const d=new Date(e.date).toLocaleDateString('en-US');return d+',"'+e.merchant+'",'+(CATS[e.category]||CATS.other).l+','+e.amount.toFixed(2)+',"'+(e.note||'').replace(/"/g,'""')+'",'+(e.recurring?'Yes':'No')}).join('\n');const blob=new Blob([hdr+rows],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='budget-'+label.replace(/\s+/g,'-').toLowerCase()+'.csv';a.click();URL.revokeObjectURL(a.href)}

// ═══ TAB BAR ═══
function rTabs(){const bar=h('div',{class:'tabs'});[{k:'dashboard',i:'📊',l:'Dashboard'},{k:'add',i:'➕',l:'Add'},{k:'history',i:'🧾',l:'History'},{k:'settings',i:'⚙️',l:'Settings'}].forEach(t=>{bar.appendChild(h('button',{class:'tab '+(S.tab===t.k?'tab-on':'tab-off'),onClick:()=>{S.tab=t.k;render()}},h('span',{class:'tab-icon'},t.i),h('span',{class:'tab-label'},t.l)))});return bar}

// ═══ DEEP LINK ═══
(function(){const p=new URLSearchParams(window.location.search);const rawA=p.get('amount'),rawM=p.get('merchant'),src=p.get('source')||'Apple Pay';if(rawA){const amt=parseFloat(decodeURIComponent(rawA).replace(/[^0-9.]/g,''));const merchant=rawM?decodeURIComponent(rawM).replace(/[.!,;]+$/,'').trim().slice(0,40):'Apple Pay';if(amt>0){S.drafts.push({id:uid(),merchant:merchant||'Apple Pay',amount:amt,source:src,suggestedCategory:categorize(merchant||''),timestamp:new Date().toISOString()});save();S.tab='dashboard'}window.history.replaceState({},'',window.location.pathname)}const text=p.get('text');if(text&&!rawA){const patterns=[/(?:made a|spent|charged|transaction)\s*\$?([\d,]+\.?\d*)\s*(?:at|to|for)\s+(.+)/i,/(?:sent|paid)\s+\$?([\d,]+\.?\d*)\s+(?:to|for)\s+(.+)/i,/\$?([\d,]+\.?\d{2})\s+(?:at|to|for)\s+(.+)/i];for(const pt of patterns){const m=decodeURIComponent(text).match(pt);if(m){const amt=parseFloat(m[1].replace(/,/g,''));const merchant=m[2].replace(/[.!,;]+$/,'').trim().slice(0,40);if(amt>0&&merchant){S.drafts.push({id:uid(),merchant,amount:amt,source:src,suggestedCategory:categorize(merchant),timestamp:new Date().toISOString()});save();break}}}window.history.replaceState({},'',window.location.pathname)}})();

if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
applyTheme();requestNotifs();render();
